<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>수박게임</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="game-panel" aria-label="수박게임">
        <div class="game-topbar">
          <div>
            <p class="eyebrow">Watermelon Game</p>
            <h1>수박게임</h1>
          </div>
          <div class="stat-row" aria-label="점수 정보">
            <div class="stat">
              <span>점수</span>
              <strong id="score">0</strong>
            </div>
            <div class="stat">
              <span>최고</span>
              <strong id="bestScore">0</strong>
            </div>
          </div>
        </div>

        <div class="play-layout">
          <div class="board-wrap">
            <canvas
              id="gameCanvas"
              width="420"
              height="640"
              aria-label="수박게임 보드"
            ></canvas>
            <div id="gameOverlay" class="game-overlay is-hidden" role="dialog" aria-live="polite">
              <div>
                <p id="overlayKicker">게임 오버</p>
                <h2 id="overlayTitle">과일이 넘쳤어요</h2>
                <button id="overlayRestart" type="button">다시 시작</button>
              </div>
            </div>
          </div>

          <aside class="side-panel" aria-label="게임 상태와 조작">
            <div class="next-card">
              <span>다음 과일</span>
              <canvas id="nextCanvas" width="120" height="120" aria-label="다음 과일 미리보기"></canvas>
            </div>

            <div class="controls">
              <button id="restartButton" type="button" title="다시 시작" aria-label="다시 시작">
                <span aria-hidden="true">↻</span>
              </button>
              <button id="pauseButton" type="button" title="일시정지" aria-label="일시정지">
                <span aria-hidden="true">Ⅱ</span>
              </button>
              <button id="muteButton" type="button" title="소리 끄기" aria-label="소리 끄기">
                <span aria-hidden="true">♪</span>
              </button>
            </div>

            <div class="hint-list">
              <p>마우스나 손가락으로 위치를 잡고 클릭해서 떨어뜨려요.</p>
              <p>← → 이동, Space 또는 Enter로 떨어뜨릴 수 있어요.</p>
            </div>
          </aside>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>
    <script src="game.js"></script>
  </body>
</html>
